<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Details</title>
    <link rel="stylesheet" href="D:\Freelancing\projects\POKEMON_PROJECT\main\css\home.css">
</head>
<body>

    <div class="container">
        <div id = "searchContainer">
            <input type="text" id="searchInput" placeholder="Pokémon...">
            <button id="searchButton" onclick="fetchPokemon()">🔎</button>
        </div>
        

        <!-- TOP SECTION -->
        <section class="top-section">

            <!-- LEFT SIDE -->
            <div class="left-panel">

                <div class="pokemon-image-card">
                    <img
                        src=""
                        alt="Pokemon"
                    >
                </div>

                <div class="name-card">
                    <h1></h1>
                    <p></p>
                </div>

                <div class="details-card">

                    <h2>Details</h2>

                    <div class="detail-item">
                        <span>Height</span>
                        <p></p>
                    </div>

                    <div class="detail-item">
                        <span>Weight</span>
                        <p></p>
                    </div>

                    <div class="detail-item">
                        <span>Type</span>
                        <p></p>
                    </div>

                    <div class="detail-item">
                        <span>Ability</span>
                        <p></p>
                    </div>

                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div class="right-panel">

                <div class="stats-card">

                    <h2>Base Stats</h2>

                    <div class="stat">
                        <span>HP</span>
                        <div class="bar">
                            <div class="fill" style="width:35%"><p></p></div>
                        </div>
                    </div>

                    <div class="stat">
                        <span>Attack</span>
                        <div class="bar">
                            <div class="fill" style="width:0%"><p></p></div>
                        </div>
                    </div>

                    <div class="stat">
                        <span>Defense</span>
                        <div class="bar">
                            <div class="fill" style="width:0%"><p></p></div>
                        </div>
                    </div>

                    <div class="stat">
                        <span>Special Attack</span>
                        <div class="bar">
                            <div class="fill" style="width:0%"><p></p></div>
                        </div>
                    </div>

                    <div class="stat">
                        <span>Special Defense</span>
                        <div class="bar">
                            <div class="fill" style="width:0%"><p></p></div>
                        </div>
                    </div>

                    <div class="stat">
                        <span>Speed</span>
                        <div class="bar">
                            <div class="fill" style="width:0%"><p></p></div>
                        </div>
                    </div>

                </div>

                <div id="evolution-card">

                    <h2>Evolution Chain</h2>

                    <div id="evolution-chain">

                        <!-- <div class="evolution">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/172.png">
                            <p>Pichu</p>
                        </div> 

                        <span>→</span>

                        <div class="evolution">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png">
                            <p>Pikachu</p>
                        </div>

                        <span>→</span>

                        <div class="evolution">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/26.png">
                            <p>Raichu</p>
                        </div> -->

                    </div>

                </div>

            </div>

        </section>

        <!-- MOVES SECTION -->

        <section class="moves-section">

            <button class="moves-btn" id="dropDownBtn">
                ▼ Moves
            </button>

            <div class="moves-container" id="movesDropDown" style="display: none;">

                <!-- <div class="move-card">Thunderbolt</div>
                <div class="move-card">Quick Attack</div>
                <div class="move-card">Thunder</div>
                <div class="move-card">Volt Tackle</div>
                <div class="move-card">Electro Ball</div>
                <div class="move-card">Iron Tail</div> -->

            </div>

        </section>
        <div id="moveModal" class="modal">

            <div class="modal-content">

                <span id="closeModal">&times;</span>

                <h2 id="moveName"></h2>

                <p>
                    <strong>Type:</strong>
                    <span id="moveType"></span>
                </p>

                <p>
                    <strong>Power:</strong>
                    <span id="movePower"></span>
                </p>
                
                <p>
                    <strong>Accuracy:</strong>
                    <span id="moveAccuracy"></span>
                </p>

                <p>
                    <strong>PP:</strong>
                    <span id="movePP"></span>
                </p>

                <p>
                    <strong>Damage Class:</strong>
                    <span id="moveClass"></span>
                </p>

                <p>
                    <strong>Effect:</strong>
                    <span id="moveEffect"></span>
                </p>

            </div>

        </div>

    </div>
<script src="D:\Freelancing\projects\POKEMON_PROJECT\main\js\home.js"></script>
</body>
</html>
